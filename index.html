<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Framings</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #f9f9f7;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 32px 16px;
      -webkit-font-smoothing: antialiased;
    }

    h1 {
      font-size: 15px;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #6b6b68;
      margin-bottom: 20px;
    }

    .box {
      background: #ffffff;
      border: 1px solid #e2e2de;
      border-radius: 10px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.07), 0 1px 2px rgba(0,0,0,0.05);
      width: 100%;
      max-width: 360px;
      overflow: hidden;
    }

    a.entry {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 20px;
      text-decoration: none;
      color: #111110;
      font-size: 16px;
      font-weight: 500;
      border-bottom: 1px solid #e2e2de;
      transition: background 0.1s;
    }
    a.entry:last-child { border-bottom: none; }
    a.entry:hover { background: #f4f4f2; }
    a.entry:active { background: #ececea; }

    .entry-date { font-variant-numeric: tabular-nums; }
    .entry-arrow { color: #c0c0bc; font-size: 14px; }
  </style>
</head>
<body>

  <h1>Framings</h1>

  <div class="box">
    <a class="entry" href="noticias_20260402.html">
      <span class="entry-date">2 de abril de 2026</span>
      <span class="entry-arrow">→</span>
    </a>
  </div>

</body>
</html>
